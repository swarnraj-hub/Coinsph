name: CoinsPH FX Export

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            playwright \
            boto3

      - name: Install Playwright browser
        run: |
          playwright install chromium

      - name: Debug repository
        run: |
          pwd
          find .

      - name: Run automation
        env:
          COINSPH_EMAIL: ${{ secrets.COINSPH_EMAIL }}
          COINSPH_PASSWORD: ${{ secrets.COINSPH_PASSWORD }}
          COINSPH_TOTP_SECRET: ${{ secrets.COINSPH_TOTP_SECRET }}

          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PREFIX: coinsph_fx/raw
          AWS_REGION: ap-southeast-1

        run: |
          xvfb-run -a python coinsph.py

      - name: Debug artifacts
        if: always()
        run: |
          echo "Artifacts:"
          find artifacts || true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coinsph-artifacts
          path: artifacts/
