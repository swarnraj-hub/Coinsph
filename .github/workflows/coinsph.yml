name: CoinsPH FX Export

on:
  workflow_dispatch:

  schedule:
    # 2:30 UTC = 10:30 AM Philippines
    - cron: "30 2 * * *"

jobs:
  export:
    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps

      - name: Create artifacts folder
        run: mkdir -p artifacts

      - name: Run CoinsPH automation
        env:
          COINSPH_EMAIL: ${{ secrets.COINSPH_EMAIL }}
          COINSPH_PASSWORD: ${{ secrets.COINSPH_PASSWORD }}
          COINSPH_TOTP_SECRET: ${{ secrets.COINSPH_TOTP_SECRET }}

          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PREFIX: coinsph_fx/raw
          AWS_REGION: ap-southeast-1

          PYTHONUNBUFFERED: "1"

        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python coinsph.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coinsph-debug
          path: |
            artifacts/**
            *.png
            *.html
            *.log
          if-no-files-found: warn
